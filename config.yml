max_tokens: 600
use_confirmation: true
save_history: true
history_path: ~/.gcm_history.log
history_json_path: ~/.gcm_history.jsonl
include_location: false
max_characters: 500
suggested_messages: 3
provider_strategy: auto
generator_count: 3
enable_judge: true
enable_refiner: false

providers:
   ollama:
      enabled: true
      priority: 30
      roles: ["generate"]
   openrouter:
      enabled: true
      priority: 40
      roles: ["generate"]
   openai:
      enabled: true
      priority: 70
      roles: ["generate", "judge", "refine"]
   claude:
      enabled: true
      priority: 95
      roles: ["generate", "judge", "refine"]
   codex:
      enabled: true
      priority: 100
      roles: ["generate", "judge", "refine"]

emojis:
   header: "🔀"
   add: "🆕"
   change: "📝"
   delete: "🗑️"
   info: "ℹ️"
   summary: "🎯"
   windows: "🪟"
   macos: "🍎"
   linux: "🐧"

prompt_template: |
   You are an expert software engineer and Git practitioner.
   Your ONLY output must be a compact plain-text commit message (≤300 chars).
   DO NOT echo, quote, or list any file paths or raw input from {changes} or {diff}.

   BEFORE writing the commit message, internally perform:
   1) Normalize: decode/clean path text; remove duplicates (same logical file across different roots like Sources/ and Outputs counts once).
   2) Group: by directory/topic and by numbered sequence (e.g., images/001.png..079.png).
   3) Count: produce totals per change type (added/modified/removed) and roll-ups by major group
      (e.g., "Kali 2018.4 images", "Metasploitable3 images", "Criptografia images").
   4) Summarize: NEVER enumerate files; use counts/ranges only. If >20 items in a group, show just the count.

   HARD CONSTRAINTS (must follow):
   - Do NOT print any path, filename, quotes, ranges, or lists from {changes}/{diff}.
   - Show at most 2 topical roll-ups (largest groups) and collapse the rest as "others".
   - Prefer numbers over examples (e.g., "79 images" not the filenames).
   - Keep complete sentences; no markdown.

   Commit message structure:
   - First line: Conventional Commits summary (feat|fix|chore|refactor|docs|test|ci|build|perf|style).
   - One short sentence explaining the why/intent.
   - One short sentence with totals/roll-ups (numbers only).

   Additional context (optional). You may rewrite it to improve clarity but do NOT list files:
   {note}

   Changes (use only to compute counts; NEVER print them):
   {changes}

   Diff summary (use only to compute counts; NEVER print it):
   {diff}
